name: Publish
on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: Optional prerelease suffix, for example alpha, beta, rc.1
        required: false
        type: string

permissions:
  contents: write
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: ^2
          cache: true
      - run: deno install --frozen
      - name: Resolve and update publish version
        id: version
        shell: bash
        env:
          PRERELEASE_INPUT: ${{ github.event.inputs.prerelease }}
        run: |
          prerelease="$(echo "$PRERELEASE_INPUT" | xargs)"

          if [[ -n "$prerelease" && ! "$prerelease" =~ ^[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*$ ]]; then
            echo "::error::Prerelease suffix must be dot-separated alphanumeric or hyphen identifiers"
            exit 1
          fi

          deno eval '
            const prerelease = Deno.env.get("PRERELEASE_INPUT")?.trim() ?? "";
            const configPath = "deno.json";
            const config = JSON.parse(Deno.readTextFileSync(configPath));
            const version = config.version ?? "";

            if (!version) {
              throw new Error("Missing version in deno.json");
            }

            const publishVersion = prerelease ? `${version}-${prerelease}` : version;
            const isStable = prerelease ? "false" : "true";

            if (isStable === "false") {
              Deno.writeTextFileSync(
                configPath,
                `${JSON.stringify({ ...config, version: publishVersion }, null, 2)}\n`,
              );
            }

            const output = Deno.env.get("GITHUB_OUTPUT");
            if (!output) {
              throw new Error("Missing GITHUB_OUTPUT");
            }

            Deno.writeTextFileSync(
              output,
              `publish_version=${publishVersion}\nis_stable=${isStable}\n`,
              { append: true },
            );
          '

      - name: Guard stable release branch
        if: ${{ steps.version.outputs.is_stable == 'true' }}
        shell: bash
        run: |
          if [[ "$GITHUB_REF_NAME" != "main" ]]; then
            echo "::error::Stable releases can only be published from the main branch"
            exit 1
          fi

      - name: Publish
        shell: bash
        run: deno publish  --allow-dirty

      - name: Create GitHub release
        if: ${{ steps.version.outputs.is_stable == 'true' }}
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.version.outputs.publish_version }}
          name: v${{ steps.version.outputs.publish_version }}
          commit: ${{ github.sha }}
          generateReleaseNotes: true
